<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cães • CãoTrilha</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-body-tertiary">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">

    <button class="btn btn-outline-light" data-bs-toggle="offcanvas" data-bs-target="#menuLateral">
      ☰
    </button>

    <a class="navbar-brand ms-2">CãoTrilha</a>

    <div class="dropdown">
      <button class="btn btn-outline-light dropdown-toggle" data-bs-toggle="dropdown">
        admin@esjaloures.org
      </button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><button class="dropdown-item text-danger" onclick="logout()">Sair</button></li>
      </ul>
    </div>

  </div>
</nav>

<!-- MENU -->
<div class="offcanvas offcanvas-start text-bg-dark" id="menuLateral">
  <div class="offcanvas-header">
    <h5>Menu</h5>
    <button class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
  </div>

  <div class="offcanvas-body">
    <ul class="nav flex-column gap-2">
      <li><a href="index.html" class="nav-link text-white">🏠 Dashboard</a></li>
      <li><a href="caes.html" class="nav-link text-warning">🐶 Cães</a></li>
      <li><a href="trilhas.html" class="nav-link text-white">🌲 Trilhas</a></li>
      <li><a href="estadias.html" class="nav-link text-white">🏡 Estadias</a></li>
      <li><a href="clientes.html" class="nav-link text-white">👤 Clientes</a></li>
    </ul>
  </div>
</div>

<!-- CONTEÚDO -->
<div class="container py-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>🐶 Cães</h2>
    <button class="btn btn-dark" onclick="abrirModal()">+ Novo Cão</button>
  </div>

  <div class="mb-3">
    <input type="text" id="pesquisa" class="form-control" placeholder="Pesquisar cão..." onkeyup="filtrar()">
  </div>

  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-dark">
          <tr>
            <th>Nome</th>
            <th>Raça</th>
            <th>Idade</th>
            <th>Dono</th>
            <th>Estado</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaCaes"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modalCao">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Novo Cão</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input id="nome" class="form-control mb-2" placeholder="Nome">
        <input id="raca" class="form-control mb-2" placeholder="Raça">
        <input id="idade" type="number" class="form-control mb-2" placeholder="Idade">
        <input id="dono" class="form-control mb-2" placeholder="Dono">
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-dark" onclick="guardar()">Guardar</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// CLIENTES
const clientes = [
{id:1,nome:"João Silva"},
{id:2,nome:"Maria Santos"},
{id:3,nome:"Pedro Costa"},
{id:4,nome:"Ana Pereira"},
{id:5,nome:"Carlos Ferreira"},
{id:6,nome:"Sofia Oliveira"},
{id:7,nome:"Ricardo Sousa"},
{id:8,nome:"Inês Martins"},
{id:9,nome:"Miguel Rocha"},
{id:10,nome:"Beatriz Almeida"},
{id:11,nome:"Tiago Gomes"},
{id:12,nome:"Carla Ribeiro"},
{id:13,nome:"Bruno Carvalho"},
{id:14,nome:"Patrícia Mendes"},
{id:15,nome:"André Lopes"}
];

// CÃES
let caes = JSON.parse(localStorage.getItem("caes")) || [
  {nome:"Thor", raca:"Boiadeiro de Berna", idade:3, cliente:1, estado:"Creche"},
  {nome:"Luna", raca:"Cão Islandês", idade:2, cliente:2, estado:"Estadia"},
  {nome:"Simba", raca:"Chow Chow", idade:4, cliente:3, estado:"Creche"},
  {nome:"Max", raca:"Golden Retriever", idade:5, cliente:4, estado:"Estadia"},
  {nome:"Nina", raca:"Husky Siberiano", idade:3, cliente:5, estado:"Creche"},
  {nome:"Kira", raca:"Husky Siberiano", idade:1, cliente:6, estado:"Creche"},
  {nome:"Bolt", raca:"Terra Nova", idade:6, cliente:7, estado:"Estadia"},
  {nome:"Pongo", raca:"Dálmata", idade:2, cliente:8, estado:"Creche"},
  {nome:"Zeus", raca:"Cane Corso", idade:4, cliente:9, estado:"Estadia"},
  {nome:"Mia", raca:"Border Collie", idade:2, cliente:10, estado:"Creche"},
  {nome:"Bobby", raca:"Shih Tzu", idade:5, cliente:11, estado:"Estadia"},
  {nome:"Rex", raca:"Rottweiler", idade:6, cliente:12, estado:"Creche"},
  {nome:"Toby", raca:"Pinscher", idade:3, cliente:13, estado:"Creche"},
  {nome:"Perdita", raca:"Dálmata", idade:2, cliente:14, estado:"Estadia"},
  {nome:"Snow", raca:"Bichon Frisé", idade:1, cliente:15, estado:"Creche"}
];

// RENDER
function render(){
  let html="";
  caes.forEach((c,i)=>{
    let dono = clientes.find(cli => cli.id === c.cliente)?.nome || "-";

    html+=`
      <tr>
        <td>${c.nome}</td>
        <td>${c.raca}</td>
        <td>${c.idade}</td>
        <td>${dono}</td>
        <td><span class="badge bg-secondary">${c.estado}</span></td>
        <td>
          <button class="btn btn-sm btn-danger" onclick="remover(${i})">🗑</button>
        </td>
      </tr>
    `;
  });
  document.getElementById("tabelaCaes").innerHTML=html;
}

// MODAL
function abrirModal(){
  new bootstrap.Modal(document.getElementById("modalCao")).show();
}

// GUARDAR
function guardar(){
  let c={
    nome:nome.value,
    raca:raca.value,
    idade:idade.value,
    cliente:1, // default
    estado:"Creche"
  };
  caes.push(c);
  localStorage.setItem("caes",JSON.stringify(caes));
  location.reload();
}

// REMOVER
function remover(i){
  if(confirm("Apagar este cão?")){
    caes.splice(i,1);
    localStorage.setItem("caes",JSON.stringify(caes));
    render();
  }
}

// PESQUISA
function filtrar(){
  let termo=pesquisa.value.toLowerCase();
  let linhas=document.querySelectorAll("#tabelaCaes tr");

  linhas.forEach(l=>{
    l.style.display=l.innerText.toLowerCase().includes(termo)?"":"none";
  });
}

// LOGOUT
function logout(){
  localStorage.removeItem("loggedIn");
  window.location.href="login.html";
}

render();
</script>

</body>
</html>
